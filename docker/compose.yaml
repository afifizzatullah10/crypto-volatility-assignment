services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: mlflow
    ports:
      - "5001:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/artifacts
    volumes:
      - ./mlruns:/mlflow/artifacts

  # Week 4 — FastAPI replay service (port 8000)
  w4-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ingestor
    container_name: w4-api
    command: python scripts/run_w4_api.py --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - kafka
    environment:
      MLFLOW_TRACKING_URI: mlruns
    volumes:
      - ../data:/app/data
      - ../mlruns:/app/mlruns
      - ../models:/app/models
      - ../scripts:/app/scripts

  # Week 4 — SSE dashboard server (port 8766)
  dashboard-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ingestor
    container_name: dashboard-server
    command: python scripts/dashboard_server.py --port 8766 --mode replay
    ports:
      - "8766:8766"
    depends_on:
      - kafka
    environment:
      MLFLOW_TRACKING_URI: mlruns
    volumes:
      - ../data:/app/data
      - ../mlruns:/app/mlruns
      - ../models:/app/models
      - ../scripts:/app/scripts

  # Week 4 — Static dashboard file server (port 8080)
  dashboard-ui:
    image: python:3.11-slim
    container_name: dashboard-ui
    command: python -m http.server 8080
    working_dir: /app/dashboard
    ports:
      - "8080:8080"
    volumes:
      - ../dashboard:/app/dashboard

volumes:
  kafka_data:
